model:
  path: "models/best.pt"
  image_size: 800
  confidence: 0.25
  device: "cuda:0"  # Use "cpu" if GPU not available

behavior:
  owner_max_dist: 120      # pixels - max distance for bag to be considered "attended"
  owner_absent_sec: 20     # seconds - time before bag is marked "unattended"
  loiter_near_radius: 70   # pixels - radius for loitering detection near unattended bag
  loiter_near_sec: 20      # seconds - time person must stay to trigger loitering alert
  running_speed: 260       # pixels/second - speed threshold for running detection

tracking:
  tracker: "botsort.yaml"
  persist: true

api:
  host: "0.0.0.0"
  port: 5001
  debug: false

logging:
  level: "INFO"
  file: "logs/ml-service.log"

